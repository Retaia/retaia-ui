name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  build-release-assets:
    name: Build UI assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Package release artifacts
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          OUT_DIR="release-assets"
          DIST_DIR="dist"
          PKG="retaia-ui-${TAG}"
          mkdir -p "${OUT_DIR}/${PKG}"
          cp -R "${DIST_DIR}/." "${OUT_DIR}/${PKG}/"
          tar -C "${OUT_DIR}" -czf "${OUT_DIR}/${PKG}.tar.gz" "${PKG}"
          (cd "${OUT_DIR}" && zip -rq "${PKG}.zip" "${PKG}")

      - name: Generate SBOM (CycloneDX JSON)
        uses: anchore/sbom-action@v0
        with:
          path: release-assets/${{ github.event.repository.name }}-${{ github.ref_name }}
          format: cyclonedx-json
          output-file: release-assets/retaia-ui-${{ github.ref_name }}.sbom.cdx.json

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          OUT_DIR="release-assets"
          PKG="retaia-ui-${TAG}"
          sha256sum \
            "${OUT_DIR}/${PKG}.tar.gz" \
            "${OUT_DIR}/${PKG}.zip" \
            "${OUT_DIR}/${PKG}.sbom.cdx.json" > "${OUT_DIR}/SHA256SUMS.txt"

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign release artifacts (keyless)
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          OUT_DIR="release-assets"
          PKG="retaia-ui-${TAG}"

          cosign sign-blob --yes \
            --output-signature "${OUT_DIR}/${PKG}.tar.gz.sig" \
            --output-certificate "${OUT_DIR}/${PKG}.tar.gz.pem" \
            "${OUT_DIR}/${PKG}.tar.gz"

          cosign sign-blob --yes \
            --output-signature "${OUT_DIR}/${PKG}.zip.sig" \
            --output-certificate "${OUT_DIR}/${PKG}.zip.pem" \
            "${OUT_DIR}/${PKG}.zip"

          cosign sign-blob --yes \
            --output-signature "${OUT_DIR}/${PKG}.sbom.cdx.json.sig" \
            --output-certificate "${OUT_DIR}/${PKG}.sbom.cdx.json.pem" \
            "${OUT_DIR}/${PKG}.sbom.cdx.json"

      - name: Verify signatures before publish
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          OUT_DIR="release-assets"
          PKG="retaia-ui-${TAG}"
          IDENTITY="https://github.com/${GITHUB_REPOSITORY}/.github/workflows/release.yml@refs/tags/${GITHUB_REF_NAME}"

          cosign verify-blob \
            --certificate "${OUT_DIR}/${PKG}.tar.gz.pem" \
            --signature "${OUT_DIR}/${PKG}.tar.gz.sig" \
            --certificate-identity-regexp "^${IDENTITY}$" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${OUT_DIR}/${PKG}.tar.gz"

          cosign verify-blob \
            --certificate "${OUT_DIR}/${PKG}.zip.pem" \
            --signature "${OUT_DIR}/${PKG}.zip.sig" \
            --certificate-identity-regexp "^${IDENTITY}$" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${OUT_DIR}/${PKG}.zip"

          cosign verify-blob \
            --certificate "${OUT_DIR}/${PKG}.sbom.cdx.json.pem" \
            --signature "${OUT_DIR}/${PKG}.sbom.cdx.json.sig" \
            --certificate-identity-regexp "^${IDENTITY}$" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${OUT_DIR}/${PKG}.sbom.cdx.json"

      - name: Attest release archive provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: release-assets/retaia-ui-${{ github.ref_name }}.tar.gz

      - name: Attest release zip provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: release-assets/retaia-ui-${{ github.ref_name }}.zip

      - name: Attest SBOM provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: release-assets/retaia-ui-${{ github.ref_name }}.sbom.cdx.json

      - name: Upload release assets artifact
        uses: actions/upload-artifact@v6
        with:
          name: release-ui
          retention-days: 14
          path: |
            release-assets/*.tar.gz
            release-assets/*.zip
            release-assets/*.sbom.cdx.json
            release-assets/SHA256SUMS.txt
            release-assets/*.sig
            release-assets/*.pem

  publish-container:
    name: Publish Docker image to GHCR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Extract image version from tag
        id: version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          echo "value=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Detect stable tag
        id: stable
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_NAME}" =~ -rc[0-9]+$ ]]; then
            echo "value=false" >> "${GITHUB_OUTPUT}"
          else
            echo "value=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Build image tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          OWNER_LC="${GITHUB_REPOSITORY_OWNER,,}"
          IMAGE="ghcr.io/${OWNER_LC}/retaia-ui"
          VERSION="${{ steps.version.outputs.value }}"
          if [[ "${{ steps.stable.outputs.value }}" == "true" ]]; then
            {
              echo "value<<EOF"
              echo "${IMAGE}:${VERSION}"
              echo "${IMAGE}:latest"
              echo "EOF"
            } >> "${GITHUB_OUTPUT}"
          else
            echo "value=${IMAGE}:${VERSION}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.value }}
          provenance: true
          sbom: true

  create-github-release:
    name: Publish GitHub Release
    needs:
      - build-release-assets
      - publish-container
    runs-on: ubuntu-latest
    steps:
      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Detect pre-release tag
        id: prerelease
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "${TAG}" =~ -rc[0-9]+$ ]]; then
            echo "value=true" >> "${GITHUB_OUTPUT}"
          else
            echo "value=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ steps.prerelease.outputs.value }}
          files: |
            release-assets/*.tar.gz
            release-assets/*.zip
            release-assets/*.sbom.cdx.json
            release-assets/SHA256SUMS.txt
            release-assets/*.sig
            release-assets/*.pem
